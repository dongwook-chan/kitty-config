# Remote control 활성화 (kitty @ 명령 사용)
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

tab_bar_style custom
tab_bar_min_tabs 1
tab_fade 1
tab_bar_edge top

cursor #000000

background #F5F5F5
foreground #333333

inactive_tab_foreground #333333
inactive_tab_background #D0D0D0
active_tab_foreground #000000
active_tab_background #F5F5F5

map cmd+c combine : copy_to_clipboard : send_text all \x1b[67;9u
map cmd+v paste_from_clipboard
map cmd+0x8 combine : copy_to_clipboard : send_text all \x1b[67;9u
map cmd+0x9 paste_from_clipboard
# Undo/Redo
map cmd+z send_key ctrl+underscore
map cmd+0x7a send_key ctrl+underscore
map cmd+shift+z send_key alt+underscore
map cmd+shift+0x7a send_key alt+underscore

# Select all (Cmd+A sends custom sequence to zsh)
map cmd+a send_text all \x1b[65;9u
map cmd+0x0 send_text all \x1b[65;9u

# Line navigation
map cmd+left send_text all \x01
map cmd+right send_text all \x05
map cmd+shift+left send_text all \x1b[72;10u
map cmd+shift+right send_text all \x1b[69;10u

# Search (Cmd+F)
map cmd+f search_scrollback
map cmd+0x3 search_scrollback

# Window management
map cmd+shift+w close_window
map cmd+shift+n launch --type=overlay sh ~/.config/kitty/new_os_window.sh
map cmd+shift+0x2d launch --type=overlay sh ~/.config/kitty/new_os_window.sh

# Rename
map cmd+r set_tab_title
map cmd+0xf set_tab_title

# Tab reorder
map cmd+alt+shift+[ move_tab_backward
map cmd+alt+shift+] move_tab_forward

# New tab after current
map cmd+t launch --type=tab --location=after
map cmd+0x11 launch --type=tab --location=after

# Tab navigation
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
